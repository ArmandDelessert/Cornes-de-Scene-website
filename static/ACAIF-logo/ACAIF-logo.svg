<svg	xmlns="http://www.w3.org/2000/svg"
			viewBox="0 0 320 140"
			width="320" height="140"
			aria-label="Logo ACAIF">
	<defs>
		<style type="text/css">
			@import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&amp;family=Outfit:wght@100..900&amp;display=swap');
		</style>
	</defs>
	<rect width="320" height="140" rx="15" fill="white" fill-opacity="0.7" />
	<g	font-family="'Outfit', 'Futura', 'Century Gothic', sans-serif"
			font-size="60" font-weight="normal" text-anchor="start">
		<text	x="15" y="85" textLength="130" lengthAdjust="spacing"
					stroke-width="2" stroke-linejoin="round" style="paint-order: stroke fill;">
			<tspan fill="#a6a6a6" stroke="#a6a6a6">a</tspan>
			<tspan fill="#cf2e2e" stroke="#cf2e2e">c</tspan>
			<tspan fill="#cf2e2e" stroke="#cf2e2e">a</tspan>
			<tspan fill="#000000" stroke="#000000">i</tspan>
		</text>
	</g>
	<g	font-family="'Outfit', 'Futura', 'Century Gothic', sans-serif"
			font-size="100" font-weight="normal" text-anchor="start" fill="#cf2e2e">
		<text x="145" y="105" textLength="150" lengthAdjust="spacing">
			<tspan>f</tspan>
		</text>
	</g>
	<g	font-family="'Noto Sans', sans-serif"
			font-size="20" text-anchor="start" font-style="italic" fill="#000000">
		<text x="20" y="105" textLength="125" lengthAdjust="spacing">
			<tspan>association</tspan>
		</text>
	</g>
	<g	font-family="'Noto Sans', sans-serif"
			font-size="20" text-anchor="start" font-style="italic" fill="#000000">
		<text>
			<tspan x="180" y="45">commerçants</tspan>
			<tspan x="180" y="65">artisans</tspan>
			<tspan x="180" y="85">industriels</tspan>
			<tspan x="180" y="105">de Forel (Lx)</tspan>
		</text>
	</g>
</svg>