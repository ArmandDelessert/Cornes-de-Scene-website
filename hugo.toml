baseURL = "https://cornes-de-scene.ch/"
locale = "fr-CH"
title = "Les Cornes de Scène"
timeZone = "Europe/Zurich"
buildFuture = true

[params]
  author = "Les Cornes de Scène"
  site_logo = "/CdS-logo/Logo_CdS_Castellar_V1.2_Rond.webp"
  description = "Site officiel des Cornes de Scène, troupe de théâtre amateur de Forel (Lavaux)."

[[cascade]]
  featured_image = "/red-velvet-curtains.avif"
  [cascade.target]
    path = "/**"

[outputs]
  home = ["HTML", "RSS"]

[permalinks]
  events = "/events/:contentbasename/"

[module]
  [[module.imports]]
    path = "github.com/gohugo-ananke/ananke/v2"

[[menu.main]]
  name = "Accueil"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Pièces de théâtre"
  url = "/events/"
  weight = 2
