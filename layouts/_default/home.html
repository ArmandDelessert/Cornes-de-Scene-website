{{ define "main" }}
<article class="pa3 pa4-ns nested-copy-line-height">
  {{/* Contenu de la page d'accueil */}}
  <section class="cf ph3 ph5-l pv3 pv4-l f4 tc-l center measure-wide lh-copy mid-gray">
    {{ .Content }}
  </section>

  {{/* Lien vers les pièces de théâtre */}}
  {{ $plays := where .Site.RegularPages "Section" "events" }}
  {{ if $plays }}
  <section class="mw8 center ph3 ph5-l pv4">
    <div class="tc mt4">
      <a href="/events/" class="f5 fw6 link br3 ph4 pv3 dib white bg-dark-blue hover-bg-blue">Voir toutes nos pièces de théâtre</a>
    </div>
  </section>
  {{ end }}
</article>
{{ end }}
